spring:
  datasource:
    url: jdbc:h2:mem:coinzzickmock-${random.uuid};MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  sql:
    init:
      mode: never
  task:
    scheduling:
      enabled: false

coin:
  bitget:
    websocket:
      enabled: false
  market:
    startup-warmup:
      enabled: false
    startup-backfill:
      enabled: false
    history-repair:
      worker:
        enabled: false
  cache:
    redis:
      enabled: false
  leaderboard:
    redis:
      enabled: false
    refresh:
      enabled: false
    warmup:
      enabled: false
  account:
    wallet-history:
      startup-baseline:
        enabled: false
