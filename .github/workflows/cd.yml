name: CD

on:
  push:
    branches:
      - main
      - master
    paths:
      - "backend/**"
      - "docker-compose.backend.prod.yml"
      - "docker-compose.infra.prod.yml"
      - "infra/**"
  workflow_dispatch:
    inputs:
      deploy_scope:
        description: "Deployment effect to apply. Use auto only for push-style path classification."
        required: true
        default: backend-image
        type: choice
        options:
          - backend-image
          - backend-runtime
          - backend-agent-runtime
          - infra-runtime
          - nginx-config
          - all
          - auto
      image_tag:
        description: "Backend image tag to publish and deploy. Defaults to the short commit SHA."
        required: false
        type: string
      deploy:
        description: "Deploy to EC2 after classification/verification/publish."
        required: true
        default: true
        type: boolean

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  classify:
    name: Classify Deployment Effects
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.effects.outputs.backend_image }}
      backend_runtime: ${{ steps.effects.outputs.backend_runtime }}
      backend_agent_runtime: ${{ steps.effects.outputs.backend_agent_runtime }}
      infra_runtime: ${{ steps.effects.outputs.infra_runtime }}
      nginx_config: ${{ steps.effects.outputs.nginx_config }}
      nginx_service_definition: ${{ steps.effects.outputs.nginx_service_definition }}
      deploy: ${{ steps.effects.outputs.deploy }}
      has_effect: ${{ steps.effects.outputs.has_effect }}
      backend_host_effect: ${{ steps.effects.outputs.backend_host_effect }}
      infra_host_effect: ${{ steps.effects.outputs.infra_host_effect }}
      image_tag: ${{ steps.effects.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve deployment effects
        id: effects
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_BEFORE: ${{ github.event.before || '' }}
          INPUT_DEPLOY_SCOPE: ${{ github.event.inputs.deploy_scope || 'auto' }}
          INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag || '' }}
          INPUT_DEPLOY: ${{ github.event.inputs.deploy || 'true' }}
        run: |
          set -euo pipefail

          backend_image=false
          backend_runtime=false
          backend_agent_runtime=false
          infra_runtime=false
          nginx_config=false
          nginx_service_definition=false
          deploy="${INPUT_DEPLOY:-true}"
          image_tag="${INPUT_IMAGE_TAG:-${GITHUB_SHA::7}}"
          use_path_classification=true

          if [[ ! "${image_tag}" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "::error title=Invalid image_tag::Docker image tag must match ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$."
            exit 1
          fi

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            use_path_classification=false
            case "${INPUT_DEPLOY_SCOPE}" in
              backend-image)
                backend_image=true
                ;;
              backend-runtime)
                backend_runtime=true
                ;;
              backend-agent-runtime)
                backend_agent_runtime=true
                ;;
              infra-runtime)
                infra_runtime=true
                ;;
              nginx-config)
                nginx_config=true
                ;;
              all)
                backend_image=true
                backend_runtime=true
                backend_agent_runtime=true
                infra_runtime=true
                nginx_config=true
                ;;
              auto)
                use_path_classification=true
                ;;
              *)
                echo "::error title=Unknown deploy_scope::Unsupported deploy_scope '${INPUT_DEPLOY_SCOPE}'."
                exit 1
                ;;
            esac
          fi

          if [[ "${use_path_classification}" == "true" ]]; then
            before="${EVENT_BEFORE}"
            if [[ -z "${before}" || "${before}" =~ ^0+$ ]]; then
              before="$(git rev-parse "${GITHUB_SHA}^")"
            fi

            changed_files="$(git diff --name-only "${before}" "${GITHUB_SHA}")"
            if grep -q '^backend/' <<< "${changed_files}"; then
              backend_image=true
            fi
            if grep -q '^docker-compose\.backend\.prod\.yml$' <<< "${changed_files}"; then
              backend_runtime=true
              nginx_service_definition=true
              backend_agent_runtime=true
            fi
            if grep -q '^docker-compose\.infra\.prod\.yml$' <<< "${changed_files}"; then
              infra_runtime=true
            fi
            if grep -Eq '^infra/(prometheus|grafana|loki)/' <<< "${changed_files}"; then
              infra_runtime=true
            fi
            if grep -q '^infra/promtail/' <<< "${changed_files}"; then
              infra_runtime=true
              backend_agent_runtime=true
            fi
            if grep -q '^infra/nginx/' <<< "${changed_files}"; then
              nginx_config=true
            fi
            if grep -q '^docker-compose\.prod\.yml$' <<< "${changed_files}"; then
              echo "::warning title=Legacy compose changed::docker-compose.prod.yml is a rollback anchor and is not deployed by CD. Use docker-compose.backend.prod.yml or docker-compose.infra.prod.yml for runtime changes."
            fi
          fi

          backend_host_effect=false
          infra_host_effect=false
          has_effect=false
          if [[ "${backend_image}" == "true" || "${backend_runtime}" == "true" || "${backend_agent_runtime}" == "true" || "${nginx_config}" == "true" || "${nginx_service_definition}" == "true" ]]; then
            backend_host_effect=true
          fi
          if [[ "${infra_runtime}" == "true" ]]; then
            infra_host_effect=true
          fi
          if [[ "${backend_host_effect}" == "true" || "${infra_host_effect}" == "true" ]]; then
            has_effect=true
          fi

          {
            echo "backend_image=${backend_image}"
            echo "backend_runtime=${backend_runtime}"
            echo "backend_agent_runtime=${backend_agent_runtime}"
            echo "infra_runtime=${infra_runtime}"
            echo "nginx_config=${nginx_config}"
            echo "nginx_service_definition=${nginx_service_definition}"
            echo "backend_host_effect=${backend_host_effect}"
            echo "infra_host_effect=${infra_host_effect}"
            echo "deploy=${deploy}"
            echo "has_effect=${has_effect}"
            echo "image_tag=${image_tag}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "### CD effect classification"
            echo ""
            echo "- backend_image: \`${backend_image}\`"
            echo "- backend_runtime: \`${backend_runtime}\`"
            echo "- backend_agent_runtime: \`${backend_agent_runtime}\`"
            echo "- infra_runtime: \`${infra_runtime}\`"
            echo "- nginx_config: \`${nginx_config}\`"
            echo "- nginx_service_definition: \`${nginx_service_definition}\`"
            echo "- backend_host_effect: \`${backend_host_effect}\`"
            echo "- infra_host_effect: \`${infra_host_effect}\`"
            echo "- deploy: \`${deploy}\`"
            echo "- image_tag: \`${image_tag}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  verify_backend_candidate:
    name: Verify Backend Release Candidate
    runs-on: ubuntu-latest
    needs: classify
    steps:
      - name: No backend verification needed
        if: ${{ needs.classify.outputs.backend_image != 'true' }}
        run: echo "backend_image=false; skipping backend Gradle check." >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout
        if: ${{ needs.classify.outputs.backend_image == 'true' }}
        uses: actions/checkout@v5

      - name: Setup Java
        if: ${{ needs.classify.outputs.backend_image == 'true' }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Ensure Gradle wrapper is executable
        if: ${{ needs.classify.outputs.backend_image == 'true' }}
        working-directory: backend
        run: chmod +x gradlew

      - name: Run backend check and package jar
        if: ${{ needs.classify.outputs.backend_image == 'true' }}
        working-directory: backend
        run: ./gradlew check :app:bootJar --console=plain

      - name: Prepare backend jar artifact
        if: ${{ needs.classify.outputs.backend_image == 'true' }}
        working-directory: backend
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f app/build/libs/app.jar ]]; then
            printf 'Expected executable jar at app/build/libs/app.jar.\n' >&2
            exit 1
          fi

      - name: Upload backend jar artifact
        if: ${{ needs.classify.outputs.backend_image == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-boot-jar
          path: backend/app/build/libs/app.jar
          if-no-files-found: error
          retention-days: 1

  publish_backend_image:
    name: Publish Backend Image To Docker Hub
    runs-on: ubuntu-latest
    needs:
      - classify
      - verify_backend_candidate
    steps:
      - name: No backend image publish needed
        if: ${{ needs.classify.outputs.backend_image != 'true' }}
        run: echo "backend_image=false; skipping Docker Hub publish." >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout
        if: ${{ needs.classify.outputs.backend_image == 'true' }}
        uses: actions/checkout@v5

      - name: Download backend jar artifact
        if: ${{ needs.classify.outputs.backend_image == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: backend-boot-jar
          path: backend/app/build/libs

      - name: Setup QEMU for ARM64 build
        if: ${{ needs.classify.outputs.backend_image == 'true' }}
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Setup Docker Buildx
        if: ${{ needs.classify.outputs.backend_image == 'true' }}
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: ${{ needs.classify.outputs.backend_image == 'true' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        if: ${{ needs.classify.outputs.backend_image == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          target: jar-runtime
          platforms: linux/arm64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/coin-zzickmock-backend:${{ needs.classify.outputs.image_tag }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  deploy_backend_host:
    name: Deploy Backend Host Effects
    runs-on: ubuntu-latest
    needs:
      - classify
      - deploy_infra_host
      - publish_backend_image
    steps:
      - name: Summarize skipped backend host deploy
        if: ${{ needs.classify.outputs.deploy != 'true' || needs.classify.outputs.backend_host_effect != 'true' }}
        run: |
          {
            echo "### Backend host deploy skipped"
            echo ""
            echo "- deploy: \`${{ needs.classify.outputs.deploy }}\`"
            echo "- backend_host_effect: \`${{ needs.classify.outputs.backend_host_effect }}\`"
            echo "- Infra host was not touched by this job."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout
        if: ${{ needs.classify.outputs.deploy == 'true' && needs.classify.outputs.backend_host_effect == 'true' }}
        uses: actions/checkout@v5

      - name: Prepare backend host SSH
        if: ${{ needs.classify.outputs.deploy == 'true' && needs.classify.outputs.backend_host_effect == 'true' }}
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT }}
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${EC2_HOST}" || -z "${EC2_SSH_PRIVATE_KEY}" ]]; then
            echo "::error title=Missing backend host SSH secrets::Set EC2_HOST and EC2_SSH_PRIVATE_KEY."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/ec2_key
          sed -i 's/\r$//' ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keygen -y -f ~/.ssh/ec2_key > /dev/null
          ssh-keyscan -p "${EC2_SSH_PORT:-22}" "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Stage backend host files
        if: ${{ needs.classify.outputs.deploy == 'true' && needs.classify.outputs.backend_host_effect == 'true' }}
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT }}
          EC2_USER: ${{ secrets.EC2_USER }}
          REMOTE_STAGE_DIR: /tmp/coin-zzickmock-backend-${{ github.sha }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          if [[ -z "${EC2_USER}" ]]; then
            echo "::error title=Missing EC2_USER::Set EC2_USER."
            exit 1
          fi
          ssh -i ~/.ssh/ec2_key -p "${EC2_SSH_PORT:-22}" "${EC2_USER}@${EC2_HOST}" \
            "rm -rf '${REMOTE_STAGE_DIR}' && mkdir -p '${REMOTE_STAGE_DIR}/infra'"
          scp -i ~/.ssh/ec2_key -P "${EC2_SSH_PORT:-22}" docker-compose.backend.prod.yml \
            "${EC2_USER}@${EC2_HOST}:${REMOTE_STAGE_DIR}/docker-compose.backend.prod.yml"
          scp -i ~/.ssh/ec2_key -P "${EC2_SSH_PORT:-22}" -r \
            infra/nginx infra/promtail \
            "${EC2_USER}@${EC2_HOST}:${REMOTE_STAGE_DIR}/infra/"

      - name: Apply backend host effects
        if: ${{ needs.classify.outputs.deploy == 'true' && needs.classify.outputs.backend_host_effect == 'true' }}
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          REMOTE_STAGE_DIR: /tmp/coin-zzickmock-backend-${{ github.sha }}-${{ github.run_attempt }}
          BACKEND_IMAGE_EFFECT: ${{ needs.classify.outputs.backend_image }}
          BACKEND_RUNTIME_EFFECT: ${{ needs.classify.outputs.backend_runtime }}
          BACKEND_AGENT_RUNTIME_EFFECT: ${{ needs.classify.outputs.backend_agent_runtime }}
          NGINX_CONFIG_EFFECT: ${{ needs.classify.outputs.nginx_config }}
          NGINX_SERVICE_DEFINITION_EFFECT: ${{ needs.classify.outputs.nginx_service_definition }}
          CANDIDATE_BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/coin-zzickmock-backend:${{ needs.classify.outputs.image_tag }}
        run: |
          set -euo pipefail
          if [[ -z "${EC2_DEPLOY_PATH}" ]]; then
            echo "::error title=Missing EC2_DEPLOY_PATH::Set EC2_DEPLOY_PATH."
            exit 1
          fi

          remote_command=""
          for name in \
            BACKEND_IMAGE_EFFECT \
            BACKEND_RUNTIME_EFFECT \
            BACKEND_AGENT_RUNTIME_EFFECT \
            NGINX_CONFIG_EFFECT \
            NGINX_SERVICE_DEFINITION_EFFECT \
            CANDIDATE_BACKEND_IMAGE \
            DOCKERHUB_USERNAME \
            DOCKERHUB_TOKEN \
            EC2_DEPLOY_PATH \
            REMOTE_STAGE_DIR
          do
            value="${!name}"
            remote_command+="${name}=$(printf '%q' "${value}") "
          done

          ssh -i ~/.ssh/ec2_key -p "${EC2_SSH_PORT:-22}" "${EC2_USER}@${EC2_HOST}" \
            "${remote_command}bash -s" <<'REMOTE_BACKEND_DEPLOY'
          set -euo pipefail

          backend_compose_file="docker-compose.backend.prod.yml"
          backend_agent_services=(promtail nginx-exporter node-exporter)

          detect_compose() {
            if docker version >/dev/null 2>&1; then
              docker_cmd=(docker)
            elif sudo -n docker version >/dev/null 2>&1; then
              docker_cmd=(sudo -n docker)
            else
              echo "Docker is not available to the backend SSH user. Grant docker group access or passwordless sudo for docker." >&2
              exit 1
            fi

            if "${docker_cmd[@]}" compose version >/dev/null 2>&1; then
              compose=("${docker_cmd[@]}" compose)
            elif command -v docker-compose >/dev/null 2>&1 && docker-compose version >/dev/null 2>&1; then
              compose=(docker-compose)
            elif command -v docker-compose >/dev/null 2>&1 && sudo -n docker-compose version >/dev/null 2>&1; then
              compose=(sudo -n docker-compose)
            else
              echo "Docker Compose is not available on the backend host." >&2
              exit 1
            fi
          }

          require_backend_image_line() {
            local env_file="$1"
            if [[ ! -f "${env_file}" ]]; then
              echo ".env.prod is missing at ${env_file}." >&2
              exit 1
            fi
            if ! grep -q '^BACKEND_IMAGE=' "${env_file}"; then
              echo ".env.prod must contain BACKEND_IMAGE before backend CD can preflight compose." >&2
              exit 1
            fi
          }

          validate_candidate_image() {
            if [[ "${BACKEND_IMAGE_EFFECT}" != "true" ]]; then
              return
            fi
            if [[ -z "${CANDIDATE_BACKEND_IMAGE}" || "${CANDIDATE_BACKEND_IMAGE}" =~ [[:space:]] ]]; then
              echo "Candidate backend image is empty or contains unsupported characters." >&2
              exit 1
            fi
          }

          replace_backend_image_line() {
            local source_env="$1"
            local target_env="$2"
            awk -v image="${CANDIDATE_BACKEND_IMAGE}" '
              BEGIN { replaced = 0 }
              /^BACKEND_IMAGE=/ {
                print "BACKEND_IMAGE=" image
                replaced = 1
                next
              }
              { print }
              END { if (replaced != 1) exit 3 }
            ' "${source_env}" > "${target_env}"
          }

          install_candidate_env() {
            local mode owner group temp_live_env
            mode="$(stat -c '%a' "${live_env}")"
            owner="$(stat -c '%u' "${live_env}")"
            group="$(stat -c '%g' "${live_env}")"
            temp_live_env="${EC2_DEPLOY_PATH}/.env.prod.tmp.$$"
            sudo install -m "${mode}" -o "${owner}" -g "${group}" "${candidate_env}" "${temp_live_env}"
            sudo mv "${temp_live_env}" "${live_env}"
          }

          should_promote_backend_compose() {
            [[ "${BACKEND_RUNTIME_EFFECT}" == "true" || "${BACKEND_AGENT_RUNTIME_EFFECT}" == "true" || "${NGINX_SERVICE_DEFINITION_EFFECT}" == "true" ]]
          }

          should_promote_nginx_config() {
            [[ "${NGINX_CONFIG_EFFECT}" == "true" || "${NGINX_SERVICE_DEFINITION_EFFECT}" == "true" ]]
          }

          should_promote_promtail_config() {
            [[ "${BACKEND_AGENT_RUNTIME_EFFECT}" == "true" || "${BACKEND_RUNTIME_EFFECT}" == "true" ]]
          }

          preflight_candidate() {
            local compose_file
            if should_promote_backend_compose; then
              compose_file="${REMOTE_STAGE_DIR}/${backend_compose_file}"
              echo "Preflighting staged backend-host compose contract."
            else
              compose_file="${EC2_DEPLOY_PATH}/${backend_compose_file}"
              echo "Preflighting live backend-host compose with candidate environment."
            fi
            env -u BACKEND_IMAGE "${compose[@]}" --env-file "${candidate_env}" -f "${compose_file}" config --quiet
          }

          promote_candidate() {
            if should_promote_backend_compose; then
              sudo cp "${REMOTE_STAGE_DIR}/${backend_compose_file}" "${EC2_DEPLOY_PATH}/${backend_compose_file}"
            fi
            if should_promote_nginx_config; then
              sudo mkdir -p "${EC2_DEPLOY_PATH}/infra"
              sudo rm -rf "${EC2_DEPLOY_PATH}/infra/nginx"
              sudo cp -R "${REMOTE_STAGE_DIR}/infra/nginx" "${EC2_DEPLOY_PATH}/infra/"
            fi
            if should_promote_promtail_config; then
              sudo mkdir -p "${EC2_DEPLOY_PATH}/infra"
              sudo rm -rf "${EC2_DEPLOY_PATH}/infra/promtail"
              sudo cp -R "${REMOTE_STAGE_DIR}/infra/promtail" "${EC2_DEPLOY_PATH}/infra/"
            fi
            if [[ "${BACKEND_IMAGE_EFFECT}" == "true" ]]; then
              install_candidate_env
            fi
          }

          compose_live() {
            env -u BACKEND_IMAGE "${compose[@]}" --env-file .env.prod -f "${backend_compose_file}" "$@"
          }

          check_backend_health() {
            local container
            container="$(compose_live ps -q backend || true)"
            if [[ -z "${container}" ]]; then
              echo "Backend container is missing after recreate." >&2
              exit 1
            fi
            for _ in $(seq 1 24); do
              local status
              status="$("${docker_cmd[@]}" inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "${container}" 2>/dev/null || true)"
              if [[ "${status}" == "healthy" || "${status}" == "running" ]]; then
                echo "Backend container health/status is ${status}."
                return
              fi
              if [[ "${status}" == "unhealthy" || "${status}" == "exited" || "${status}" == "dead" ]]; then
                echo "Backend container became ${status}. Automatic rollback is intentionally not performed." >&2
                exit 1
              fi
              sleep 5
            done
            echo "Backend health did not become healthy in time." >&2
            exit 1
          }

          reload_nginx_config() {
            local nginx_container
            nginx_container="$(compose_live ps -q nginx || true)"
            if [[ -z "${nginx_container}" ]] || [[ "$("${docker_cmd[@]}" inspect -f '{{.State.Running}}' "${nginx_container}" 2>/dev/null || true)" != "true" ]]; then
              echo "Nginx config changed, but nginx is not running; refusing config-only recreate." >&2
              exit 1
            fi
            compose_live exec -T nginx nginx -t
            compose_live exec -T nginx nginx -s reload
          }

          cleanup() { rm -rf "${REMOTE_STAGE_DIR}" || true; }
          trap cleanup EXIT

          detect_compose
          validate_candidate_image
          live_env="${EC2_DEPLOY_PATH}/.env.prod"
          require_backend_image_line "${live_env}"
          candidate_env="${REMOTE_STAGE_DIR}/.env.prod.candidate"
          if [[ "${BACKEND_IMAGE_EFFECT}" == "true" ]]; then
            replace_backend_image_line "${live_env}" "${candidate_env}"
          else
            cp "${live_env}" "${candidate_env}"
          fi

          preflight_candidate
          promote_candidate
          cd "${EC2_DEPLOY_PATH}"

          if [[ "${BACKEND_IMAGE_EFFECT}" == "true" ]]; then
            echo "${DOCKERHUB_TOKEN}" | "${docker_cmd[@]}" login -u "${DOCKERHUB_USERNAME}" --password-stdin
            compose_live pull backend
            compose_live up -d --no-deps backend
            check_backend_health
          elif [[ "${BACKEND_RUNTIME_EFFECT}" == "true" ]]; then
            compose_live up -d --no-deps backend
            check_backend_health
          fi

          if [[ "${BACKEND_AGENT_RUNTIME_EFFECT}" == "true" ]]; then
            compose_live pull "${backend_agent_services[@]}"
            compose_live up -d --no-deps "${backend_agent_services[@]}"
          fi

          if [[ "${NGINX_SERVICE_DEFINITION_EFFECT}" == "true" ]]; then
            compose_live pull nginx
            compose_live up -d --no-deps nginx
            compose_live exec -T nginx nginx -t
          elif [[ "${NGINX_CONFIG_EFFECT}" == "true" ]]; then
            reload_nginx_config
          fi

          "${docker_cmd[@]}" image prune -f
          compose_live ps backend nginx promtail nginx-exporter node-exporter
          REMOTE_BACKEND_DEPLOY

      - name: Verify backend metrics from infra host
        if: ${{ needs.classify.outputs.deploy == 'true' && needs.classify.outputs.backend_host_effect == 'true' }}
        shell: bash
        env:
          INFRA_EC2_HOST: ${{ secrets.INFRA_EC2_HOST }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT }}
          INFRA_EC2_USER: ${{ secrets.INFRA_EC2_USER }}
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_BACKEND_METRICS_HOST: ${{ secrets.EC2_BACKEND_METRICS_HOST }}
        run: |
          set -euo pipefail
          if [[ -z "${INFRA_EC2_HOST}" || -z "${INFRA_EC2_USER}" || -z "${EC2_SSH_PRIVATE_KEY}" || -z "${EC2_BACKEND_METRICS_HOST}" ]]; then
            echo "::error title=Missing split verification secrets::Set INFRA_EC2_HOST, INFRA_EC2_USER, EC2_SSH_PRIVATE_KEY, and EC2_BACKEND_METRICS_HOST."
            exit 1
          fi
          printf '%s\n' "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/ec2_key
          sed -i 's/\r$//' ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keygen -y -f ~/.ssh/ec2_key > /dev/null
          ssh-keyscan -p "${EC2_SSH_PORT:-22}" "$INFRA_EC2_HOST" >> ~/.ssh/known_hosts
          metrics_url="http://${EC2_BACKEND_METRICS_HOST}:8080/actuator/prometheus"
          quoted_metrics_url="$(printf '%q' "${metrics_url}")"
          ssh -i ~/.ssh/ec2_key -p "${EC2_SSH_PORT:-22}" "${INFRA_EC2_USER}@${INFRA_EC2_HOST}" \
            "curl -fsS --connect-timeout 5 --max-time 10 ${quoted_metrics_url} >/dev/null"
          {
            echo "### Backend metrics scrape reachability"
            echo ""
            echo "- Source host: \`INFRA_EC2_HOST\`"
            echo "- Target URL: \`${metrics_url}\`"
            echo "- Access path: direct backend private endpoint, not Nginx"
            echo "- Result: reachable"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy_infra_host:
    name: Deploy Infra Host Effects
    runs-on: ubuntu-latest
    needs: classify
    steps:
      - name: Summarize skipped infra host deploy
        if: ${{ needs.classify.outputs.deploy != 'true' || needs.classify.outputs.infra_host_effect != 'true' }}
        run: |
          {
            echo "### Infra host deploy skipped"
            echo ""
            echo "- deploy: \`${{ needs.classify.outputs.deploy }}\`"
            echo "- infra_host_effect: \`${{ needs.classify.outputs.infra_host_effect }}\`"
            echo "- Backend host was not touched by this job."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout
        if: ${{ needs.classify.outputs.deploy == 'true' && needs.classify.outputs.infra_host_effect == 'true' }}
        uses: actions/checkout@v5

      - name: Prepare infra host SSH
        if: ${{ needs.classify.outputs.deploy == 'true' && needs.classify.outputs.infra_host_effect == 'true' }}
        shell: bash
        env:
          INFRA_EC2_HOST: ${{ secrets.INFRA_EC2_HOST }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT }}
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${INFRA_EC2_HOST}" || -z "${EC2_SSH_PRIVATE_KEY}" ]]; then
            echo "::error title=Missing infra host SSH secrets::Set INFRA_EC2_HOST and EC2_SSH_PRIVATE_KEY."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/ec2_key
          sed -i 's/\r$//' ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keygen -y -f ~/.ssh/ec2_key > /dev/null
          ssh-keyscan -p "${EC2_SSH_PORT:-22}" "$INFRA_EC2_HOST" >> ~/.ssh/known_hosts

      - name: Stage infra host files
        if: ${{ needs.classify.outputs.deploy == 'true' && needs.classify.outputs.infra_host_effect == 'true' }}
        shell: bash
        env:
          INFRA_EC2_HOST: ${{ secrets.INFRA_EC2_HOST }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT }}
          INFRA_EC2_USER: ${{ secrets.INFRA_EC2_USER }}
          REMOTE_STAGE_DIR: /tmp/coin-zzickmock-infra-${{ github.sha }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          if [[ -z "${INFRA_EC2_USER}" ]]; then
            echo "::error title=Missing INFRA_EC2_USER::Set INFRA_EC2_USER."
            exit 1
          fi
          ssh -i ~/.ssh/ec2_key -p "${EC2_SSH_PORT:-22}" "${INFRA_EC2_USER}@${INFRA_EC2_HOST}" \
            "rm -rf '${REMOTE_STAGE_DIR}' && mkdir -p '${REMOTE_STAGE_DIR}/infra'"
          scp -i ~/.ssh/ec2_key -P "${EC2_SSH_PORT:-22}" docker-compose.infra.prod.yml \
            "${INFRA_EC2_USER}@${INFRA_EC2_HOST}:${REMOTE_STAGE_DIR}/docker-compose.infra.prod.yml"
          scp -i ~/.ssh/ec2_key -P "${EC2_SSH_PORT:-22}" -r \
            infra/prometheus infra/grafana infra/loki infra/promtail \
            "${INFRA_EC2_USER}@${INFRA_EC2_HOST}:${REMOTE_STAGE_DIR}/infra/"

      - name: Apply infra host effects
        if: ${{ needs.classify.outputs.deploy == 'true' && needs.classify.outputs.infra_host_effect == 'true' }}
        shell: bash
        env:
          INFRA_EC2_HOST: ${{ secrets.INFRA_EC2_HOST }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT }}
          INFRA_EC2_USER: ${{ secrets.INFRA_EC2_USER }}
          INFRA_DEPLOY_PATH: ${{ secrets.INFRA_DEPLOY_PATH }}
          REMOTE_STAGE_DIR: /tmp/coin-zzickmock-infra-${{ github.sha }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          if [[ -z "${INFRA_EC2_USER}" ]]; then
            echo "::error title=Missing INFRA_EC2_USER::Set INFRA_EC2_USER."
            exit 1
          fi
          if [[ -z "${INFRA_DEPLOY_PATH}" ]]; then
            echo "::error title=Missing INFRA_DEPLOY_PATH::Set INFRA_DEPLOY_PATH."
            exit 1
          fi
          remote_command=""
          for name in INFRA_DEPLOY_PATH REMOTE_STAGE_DIR; do
            value="${!name}"
            remote_command+="${name}=$(printf '%q' "${value}") "
          done
          ssh -i ~/.ssh/ec2_key -p "${EC2_SSH_PORT:-22}" "${INFRA_EC2_USER}@${INFRA_EC2_HOST}" \
            "${remote_command}bash -s" <<'REMOTE_INFRA_DEPLOY'
          set -euo pipefail

          infra_compose_file="docker-compose.infra.prod.yml"
          infra_services=(redis loki promtail redis-exporter node-exporter prometheus grafana)
          infra_dirs=(prometheus grafana loki promtail)

          detect_compose() {
            if docker version >/dev/null 2>&1; then
              docker_cmd=(docker)
            elif sudo -n docker version >/dev/null 2>&1; then
              docker_cmd=(sudo -n docker)
            else
              echo "Docker is not available to the infra SSH user. Grant docker group access or passwordless sudo for docker." >&2
              exit 1
            fi

            if "${docker_cmd[@]}" compose version >/dev/null 2>&1; then
              compose=("${docker_cmd[@]}" compose)
            elif command -v docker-compose >/dev/null 2>&1 && docker-compose version >/dev/null 2>&1; then
              compose=(docker-compose)
            elif command -v docker-compose >/dev/null 2>&1 && sudo -n docker-compose version >/dev/null 2>&1; then
              compose=(sudo -n docker-compose)
            else
              echo "Docker Compose is not available on the infra host." >&2
              exit 1
            fi
          }

          cleanup() { rm -rf "${REMOTE_STAGE_DIR}" || true; }
          trap cleanup EXIT

          detect_compose
          live_env="${INFRA_DEPLOY_PATH}/.env.prod"
          if [[ ! -f "${live_env}" ]]; then
            echo ".env.prod is missing at ${live_env}." >&2
            exit 1
          fi
          candidate_env="${REMOTE_STAGE_DIR}/.env.prod.candidate"
          cp "${live_env}" "${candidate_env}"
          env -u BACKEND_IMAGE "${compose[@]}" --env-file "${candidate_env}" -f "${REMOTE_STAGE_DIR}/${infra_compose_file}" config --quiet

          sudo cp "${REMOTE_STAGE_DIR}/${infra_compose_file}" "${INFRA_DEPLOY_PATH}/${infra_compose_file}"
          sudo mkdir -p "${INFRA_DEPLOY_PATH}/infra"
          for dir in "${infra_dirs[@]}"; do
            sudo rm -rf "${INFRA_DEPLOY_PATH}/infra/${dir}"
            sudo cp -R "${REMOTE_STAGE_DIR}/infra/${dir}" "${INFRA_DEPLOY_PATH}/infra/"
          done

          cd "${INFRA_DEPLOY_PATH}"
          compose_live() {
            env -u BACKEND_IMAGE "${compose[@]}" --env-file .env.prod -f "${infra_compose_file}" "$@"
          }
          compose_live pull "${infra_services[@]}"
          compose_live up -d --no-deps "${infra_services[@]}"
          compose_live ps redis loki promtail redis-exporter node-exporter prometheus grafana
          REMOTE_INFRA_DEPLOY

      - name: Verify infra services
        if: ${{ needs.classify.outputs.deploy == 'true' && needs.classify.outputs.infra_host_effect == 'true' }}
        shell: bash
        env:
          INFRA_EC2_HOST: ${{ secrets.INFRA_EC2_HOST }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT }}
          INFRA_EC2_USER: ${{ secrets.INFRA_EC2_USER }}
          INFRA_DEPLOY_PATH: ${{ secrets.INFRA_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          if [[ -z "${INFRA_EC2_USER}" ]]; then
            echo "::error title=Missing INFRA_EC2_USER::Set INFRA_EC2_USER."
            exit 1
          fi
          if [[ -z "${INFRA_DEPLOY_PATH}" ]]; then
            echo "::error title=Missing INFRA_DEPLOY_PATH::Set INFRA_DEPLOY_PATH."
            exit 1
          fi
          remote_command="INFRA_DEPLOY_PATH=$(printf '%q' "${INFRA_DEPLOY_PATH}") "
          ssh -i ~/.ssh/ec2_key -p "${EC2_SSH_PORT:-22}" "${INFRA_EC2_USER}@${INFRA_EC2_HOST}" \
            "${remote_command}bash -s" <<'REMOTE_INFRA_VERIFY'
          set -euo pipefail
          cd "${INFRA_DEPLOY_PATH}"
          read_env_value() {
            local key="$1" default_value="$2" line
            line="$(grep -E "^${key}=" .env.prod | tail -n 1 || true)"
            if [[ -z "${line}" ]]; then
              printf '%s' "${default_value}"
            else
              printf '%s' "${line#*=}"
            fi
          }
          infra_bind_host="$(read_env_value INFRA_BIND_ADDRESS 127.0.0.1)"
          prometheus_port="$(read_env_value PROMETHEUS_PORT 9090)"
          loki_port="$(read_env_value LOKI_PORT 3100)"
          if [[ "${infra_bind_host}" == "0.0.0.0" ]]; then infra_bind_host="127.0.0.1"; fi
          prometheus_host="${infra_bind_host}"
          loki_host="${infra_bind_host}"
          curl -fsS --connect-timeout 5 --max-time 10 "http://${prometheus_host}:${prometheus_port}/-/ready" >/dev/null
          curl -fsS --connect-timeout 5 --max-time 10 "http://${loki_host}:${loki_port}/ready" >/dev/null
          REMOTE_INFRA_VERIFY
          {
            echo "### Infra service readiness"
            echo ""
            echo "- Source host: \`INFRA_EC2_HOST\`"
            echo "- Prometheus ready: checked on 127.0.0.1:9090"
            echo "- Loki ready: checked on 127.0.0.1:3100"
            echo "- Backend host was not touched."
          } >> "$GITHUB_STEP_SUMMARY"
