name: coin-zzickmock-backend

services:
  backend:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE}
    restart: unless-stopped
    cpus: "${BACKEND_CPUS:-2.0}"
    mem_limit: "${BACKEND_MEMORY_LIMIT:-1g}"
    labels:
      coin.zzickmock.application: coin-zzickmock
      coin.zzickmock.environment: ${APP_ENV:-prod}
    environment:
      JAVA_TOOL_OPTIONS: ${BACKEND_JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=65.0 -XX:InitialRAMPercentage=25.0 -XX:+ExitOnOutOfMemoryError}
      SPRING_PROFILES_ACTIVE: prod
      APP_ENV: prod
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USERNAME: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_POOL_MAX_SIZE: ${MYSQL_POOL_MAX_SIZE:-20}
      REDIS_HOST: ${REDIS_HOST:?Set REDIS_HOST to the infra Redis private DNS/IP}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET}
      APP_AUTH_COOKIE_SECURE: ${APP_AUTH_COOKIE_SECURE:-true}
      APP_AUTH_COOKIE_SAME_SITE: ${APP_AUTH_COOKIE_SAME_SITE:-None}
      BITGET_WEBSOCKET_ENABLED: ${BITGET_WEBSOCKET_ENABLED:-true}
      MARKET_HISTORY_REPAIR_QUEUE_KEY: ${MARKET_HISTORY_REPAIR_QUEUE_KEY:-coin:market:history-repair:events}
      MARKET_HISTORY_REPAIR_WORKER_ENABLED: ${MARKET_HISTORY_REPAIR_WORKER_ENABLED:-true}
      MARKET_HISTORY_REPAIR_WORKER_FIXED_DELAY_MS: ${MARKET_HISTORY_REPAIR_WORKER_FIXED_DELAY_MS:-1000}
      MARKET_HISTORY_REPAIR_WORKER_BLOCK_TIMEOUT_MS: ${MARKET_HISTORY_REPAIR_WORKER_BLOCK_TIMEOUT_MS:-2000}
      MARKET_HISTORY_REPAIR_PERSISTENCE_RETRY_MAX_ATTEMPTS: ${MARKET_HISTORY_REPAIR_PERSISTENCE_RETRY_MAX_ATTEMPTS:-5}
      MARKET_HISTORY_REPAIR_PERSISTENCE_RETRY_DELAY_MS: ${MARKET_HISTORY_REPAIR_PERSISTENCE_RETRY_DELAY_MS:-1000}
      MARKET_HISTORY_REPAIR_ENQUEUE_RETRY_MAX_ATTEMPTS: ${MARKET_HISTORY_REPAIR_ENQUEUE_RETRY_MAX_ATTEMPTS:-5}
      MARKET_HISTORY_REPAIR_ENQUEUE_RETRY_DELAY_MS: ${MARKET_HISTORY_REPAIR_ENQUEUE_RETRY_DELAY_MS:-1000}
      DAU_SUMMARY_ENABLED: ${DAU_SUMMARY_ENABLED:-true}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-info}
      LOG_LEVEL_APP: ${LOG_LEVEL_APP:-info}
      S3_BUCKET: ${S3_BUCKET:-coin-zzickmock-community-prod-672420933257-ap-southeast-2-an}
      S3_REGION: ${S3_REGION:-ap-southeast-2}
      S3_KEY_PREFIX: ${S3_KEY_PREFIX:-community}
      COMMUNITY_IMAGE_ALLOWED_MIME: ${COMMUNITY_IMAGE_ALLOWED_MIME:-image/png,image/jpeg,image/webp,image/gif}
      COMMUNITY_IMAGE_MAX_BYTES: ${COMMUNITY_IMAGE_MAX_BYTES:-5242880}
      COMMUNITY_IMAGE_PRESIGN_TTL: ${COMMUNITY_IMAGE_PRESIGN_TTL:-PT10M}
    ports:
      - "${BACKEND_BIND_ADDRESS:-0.0.0.0}:${BACKEND_PORT:-8080}:8080"
    expose:
      - "8080"
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health | grep -q UP" ]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    networks:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${NGINX_PORT:-80}:80"
      - "443:443"
    extra_hosts:
      - "grafana:${GRAFANA_PRIVATE_HOST:-${REDIS_HOST}}"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1/nginx_status | grep -q 'Active connections'" ]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - backend

  promtail:
    image: grafana/promtail:3.4.2
    restart: unless-stopped
    command: [ "-config.file=/etc/promtail/promtail.yml", "-config.expand-env=true" ]
    environment:
      LOKI_PUSH_URL: ${LOKI_PUSH_URL:-http://${REDIS_HOST}:3100/loki/api/v1/push}
    volumes:
      - ./infra/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backend

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.4.2
    restart: unless-stopped
    command:
      - --nginx.scrape-uri=http://nginx/nginx_status
    depends_on:
      - nginx
    ports:
      - "${NGINX_EXPORTER_BIND_ADDRESS:-0.0.0.0}:${NGINX_EXPORTER_PORT:-9113}:9113"
    networks:
      - backend

  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.11.1
    restart: unless-stopped
    pid: host
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($$|/)
    ports:
      - "${NODE_EXPORTER_BIND_ADDRESS:-0.0.0.0}:${NODE_EXPORTER_PORT:-9100}:9100"
    volumes:
      - /:/host:ro
    networks:
      - backend

networks:
  backend:
    driver: bridge
