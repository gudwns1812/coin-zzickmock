name: coin-zzickmock

services:
  redis:
    image: redis:7.4-alpine
    command: [ "redis-server", "--appendonly", "yes" ]
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - coin

  backend:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE}
    restart: unless-stopped
    labels:
      coin.zzickmock.application: coin-zzickmock
      coin.zzickmock.environment: ${APP_ENV:-prod}
    environment:
      SPRING_PROFILES_ACTIVE: prod
      APP_ENV: prod
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USERNAME: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_POOL_MAX_SIZE: ${MYSQL_POOL_MAX_SIZE:-20}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      REDIS_PASSWORD: ""
      JWT_SECRET: ${JWT_SECRET}
      BITGET_WEBSOCKET_ENABLED: ${BITGET_WEBSOCKET_ENABLED:-true}
      LEADERBOARD_REDIS_ENABLED: ${LEADERBOARD_REDIS_ENABLED:-true}
      LEADERBOARD_REFRESH_ENABLED: ${LEADERBOARD_REFRESH_ENABLED:-true}
      DAU_SUMMARY_ENABLED: ${DAU_SUMMARY_ENABLED:-true}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-info}
      LOG_LEVEL_APP: ${LOG_LEVEL_APP:-info}
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'" ]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    networks:
      - coin

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${NGINX_PORT:-80}:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1/nginx_status | grep -q 'Active connections'" ]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - coin

  prometheus:
    image: prom/prometheus:v3.0.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    depends_on:
      - backend
      - nginx-exporter
      - redis-exporter
      - node-exporter
      - loki
    ports:
      - "${PROMETHEUS_BIND_ADDRESS:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    networks:
      - coin

  grafana:
    image: grafana/grafana:11.5.2
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    ports:
      - "${GRAFANA_BIND_ADDRESS:-127.0.0.1}:${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_METRICS_ENABLED: "true"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://coin-zzickmock.duckdns.org/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - coin

  loki:
    image: grafana/loki:3.4.2
    restart: unless-stopped
    command: [ "-config.file=/etc/loki/loki.yml" ]
    volumes:
      - ./infra/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    networks:
      - coin

  promtail:
    image: grafana/promtail:3.4.2
    restart: unless-stopped
    command: [ "-config.file=/etc/promtail/promtail.yml" ]
    depends_on:
      - loki
    volumes:
      - ./infra/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - coin

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.4.2
    restart: unless-stopped
    command:
      - --nginx.scrape-uri=http://nginx/nginx_status
    depends_on:
      - nginx
    expose:
      - "9113"
    networks:
      - coin

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "9121"
    networks:
      - coin

  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.11.1
    restart: unless-stopped
    pid: host
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($$|/)
    expose:
      - "9100"
    volumes:
      - /:/host:ro,rslave
    networks:
      - coin

networks:
  coin:
    driver: bridge

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
  loki-data:
