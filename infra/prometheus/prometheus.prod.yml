global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    application: coin-zzickmock
    environment: production

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
        labels:
          service: prometheus

  - job_name: coin-zzickmock-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["backend-private:8080"]
        labels:
          service: backend

  - job_name: coin-zzickmock-nginx
    metrics_path: /internal/metrics/nginx
    static_configs:
      - targets: ["backend-private:80"]
        labels:
          service: nginx
    relabel_configs:
      - target_label: instance
        replacement: backend-private:9113

  - job_name: coin-zzickmock-backend-node
    metrics_path: /internal/metrics/node
    static_configs:
      - targets: ["backend-private:80"]
        labels:
          service: backend-node
    relabel_configs:
      - target_label: instance
        replacement: backend-private:9100

  - job_name: coin-zzickmock-redis
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: redis

  - job_name: coin-zzickmock-infra-node
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: infra-node

  - job_name: coin-zzickmock-loki
    static_configs:
      - targets: ["loki:3100"]
        labels:
          service: loki

  - job_name: coin-zzickmock-grafana
    metrics_path: /metrics
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          service: grafana
