spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:coin_zzickmock}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true&characterEncoding=UTF-8
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:test1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${MYSQL_POOL_MAX_SIZE:50}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  sql:
    init:
      mode: never
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}

logging:
  level:
    org.hibernate.SQL: info

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: coin-zzickmock
      service: backend
      environment: ${APP_ENV:local}

app:
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
  auth:
    jwt-secret: ${JWT_SECRET:dGhlLXF1aWNrLWJyb3duLWZveC1qdW1wcy1vdmVyLXRoZS1sYXp5LWRvZy1hbmQtc29tZS1vdGhlci1zZWNyZXQtc3R1ZmY=}
    legacy-password-endpoints-enabled: ${LEGACY_PASSWORD_ENDPOINTS_ENABLED:false}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      authorization-cookie-ttl: ${GOOGLE_OAUTH_AUTHORIZATION_COOKIE_TTL:PT5M}
      pending-cookie-ttl: ${GOOGLE_OAUTH_PENDING_COOKIE_TTL:PT10M}

coin:
  web:
    cors:
      allowed-origin-patterns: >-
        ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:3001,
        http://127.0.0.1:3000,http://127.0.0.1:3001,
        https://coin-zzickmock-frontend*.vercel.app}
  sse:
    delivery:
      executor:
        core-pool-size: 4
        max-pool-size: 16
        queue-capacity: 1000
  push:
    publisher:
      market-stream-key: ${PUSH_MARKET_STREAM_KEY:coin:push:market:v1}
      trading-stream-key: ${PUSH_TRADING_STREAM_KEY:coin:push:trading:v1}
      max-len: ${PUSH_STREAM_MAX_LEN:10000}
      market-max-age: ${PUSH_MARKET_MAX_AGE:PT15S}
      trading-max-age: ${PUSH_TRADING_MAX_AGE:PT5S}
  bitget:
    websocket:
      enabled: ${BITGET_WEBSOCKET_ENABLED:true}
      uri: ${BITGET_WEBSOCKET_URI:wss://ws.bitget.com/v2/ws/public}
      symbols:
        - BTCUSDT
        - ETHUSDT
      reconnect-delay: ${BITGET_WEBSOCKET_RECONNECT_DELAY:PT5S}
      heartbeat-delay: ${BITGET_WEBSOCKET_HEARTBEAT_DELAY:PT25S}
  market:
    history-repair:
      queue-key: ${MARKET_HISTORY_REPAIR_QUEUE_KEY:coin:market:history-repair:events}
      worker:
        enabled: ${MARKET_HISTORY_REPAIR_WORKER_ENABLED:true}
        fixed-delay-ms: ${MARKET_HISTORY_REPAIR_WORKER_FIXED_DELAY_MS:1000}
        block-timeout-ms: ${MARKET_HISTORY_REPAIR_WORKER_BLOCK_TIMEOUT_MS:2000}
      persistence-retry:
        max-attempts: ${MARKET_HISTORY_REPAIR_PERSISTENCE_RETRY_MAX_ATTEMPTS:5}
        delay-ms: ${MARKET_HISTORY_REPAIR_PERSISTENCE_RETRY_DELAY_MS:1000}
      enqueue-retry:
        max-attempts: ${MARKET_HISTORY_REPAIR_ENQUEUE_RETRY_MAX_ATTEMPTS:5}
        delay-ms: ${MARKET_HISTORY_REPAIR_ENQUEUE_RETRY_DELAY_MS:1000}
  account:
    wallet-balance-projection:
      executor:
        core-pool-size: 2
        max-pool-size: 8
        queue-capacity: 1000
  cache:
    redis:
      enabled: true
  leaderboard:
    redis:
      key-prefix: "coin:leaderboard:"
    refresh:
      enabled: false
      delay-ms: 3600000
      initial-delay-ms: 0
    warmup:
      enabled: false
  community:
    images:
      allowed-mime: ${COMMUNITY_IMAGE_ALLOWED_MIME:image/png,image/jpeg,image/webp,image/gif}
      allowed-src-prefixes: ${COMMUNITY_IMAGE_ALLOWED_SRC_PREFIXES:}
      max-bytes: ${COMMUNITY_IMAGE_MAX_BYTES:5242880}
      presign-ttl: ${COMMUNITY_IMAGE_PRESIGN_TTL:PT10M}
      key-prefix: ${S3_KEY_PREFIX:community}
    s3:
      bucket: ${S3_BUCKET:coin-zzickmock-community-local-672420933257-ap-southeast-2-an}
      region: ${S3_REGION:ap-southeast-2}
      public-base-url: ${PUBLIC_CDN_BASE_URL:${CDN_BASE_URL:}}
  activity:
    record:
      executor:
        core-pool-size: 2
        max-pool-size: 8
        queue-capacity: 1000
    summary:
      enabled: ${DAU_SUMMARY_ENABLED:true}
      cron: ${DAU_SUMMARY_CRON:0 5 0 * * *}
