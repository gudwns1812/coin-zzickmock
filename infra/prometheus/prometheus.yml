global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    application: coin-zzickmock
    environment: local

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
        labels:
          service: prometheus

  - job_name: coin-zzickmock-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["backend:8080"]
        labels:
          service: backend

  - job_name: coin-zzickmock-nginx
    static_configs:
      - targets: ["nginx-exporter:9113"]
        labels:
          service: nginx

  - job_name: coin-zzickmock-redis
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: redis

  - job_name: coin-zzickmock-loki
    static_configs:
      - targets: ["loki:3100"]
        labels:
          service: loki

  - job_name: coin-zzickmock-grafana
    metrics_path: /metrics
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          service: grafana
