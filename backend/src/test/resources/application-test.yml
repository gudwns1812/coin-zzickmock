spring:
  datasource:
    url: jdbc:h2:mem:coinzzickmock-${random.uuid};MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul
  flyway:
    enabled: true
    locations: classpath:db/migration
  sql:
    init:
      mode: never
  task:
    scheduling:
      enabled: false

coin:
  market:
    startup-warmup:
      enabled: false
    startup-backfill:
      enabled: false
