name: coin-zzickmock

services:
  mysql:
    image: mysql:8.4
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-test1234}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-coin_zzickmock}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - coin

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - coin

  backend:
    build:
      context: ./backend
      target: source-runtime
    labels:
      coin.zzickmock.application: coin-zzickmock
      coin.zzickmock.environment: ${APP_ENV:-local}
    environment:
      APP_ENV: ${APP_ENV:-local}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-coin_zzickmock}
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-test1234}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: 0
      REDIS_PASSWORD: ""
      JWT_SECRET: ${JWT_SECRET:-dGhlLXF1aWNrLWJyb3duLWZveC1qdW1wcy1vdmVyLXRoZS1sYXp5LWRvZy1hbmQtc29tZS1vdGhlci1zZWNyZXQtc3R1ZmY=}
      BITGET_WEBSOCKET_ENABLED: ${BITGET_WEBSOCKET_ENABLED:-true}
      MARKET_HISTORY_REPAIR_QUEUE_KEY: ${MARKET_HISTORY_REPAIR_QUEUE_KEY:-coin:market:history-repair:events}
      MARKET_HISTORY_REPAIR_WORKER_ENABLED: ${MARKET_HISTORY_REPAIR_WORKER_ENABLED:-true}
      MARKET_HISTORY_REPAIR_WORKER_FIXED_DELAY_MS: ${MARKET_HISTORY_REPAIR_WORKER_FIXED_DELAY_MS:-1000}
      MARKET_HISTORY_REPAIR_WORKER_BLOCK_TIMEOUT_MS: ${MARKET_HISTORY_REPAIR_WORKER_BLOCK_TIMEOUT_MS:-2000}
      MARKET_HISTORY_REPAIR_PERSISTENCE_RETRY_MAX_ATTEMPTS: ${MARKET_HISTORY_REPAIR_PERSISTENCE_RETRY_MAX_ATTEMPTS:-5}
      MARKET_HISTORY_REPAIR_PERSISTENCE_RETRY_DELAY_MS: ${MARKET_HISTORY_REPAIR_PERSISTENCE_RETRY_DELAY_MS:-1000}
      MARKET_HISTORY_REPAIR_ENQUEUE_RETRY_MAX_ATTEMPTS: ${MARKET_HISTORY_REPAIR_ENQUEUE_RETRY_MAX_ATTEMPTS:-5}
      MARKET_HISTORY_REPAIR_ENQUEUE_RETRY_DELAY_MS: ${MARKET_HISTORY_REPAIR_ENQUEUE_RETRY_DELAY_MS:-1000}
      LEADERBOARD_REFRESH_ENABLED: ${LEADERBOARD_REFRESH_ENABLED:-false}
      DAU_SUMMARY_ENABLED: ${DAU_SUMMARY_ENABLED:-true}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    networks:
      - coin

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./infra/nginx/nginx.local.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx_status | grep -q 'Active connections'"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - coin

  prometheus:
    image: prom/prometheus:v3.0.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    depends_on:
      - backend
      - nginx-exporter
      - redis-exporter
      - node-exporter
      - loki
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    networks:
      - coin

  grafana:
    image: grafana/grafana:11.5.2
    depends_on:
      - prometheus
      - loki
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_METRICS_ENABLED: "true"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - coin

  loki:
    image: grafana/loki:3.4.2
    command: ["-config.file=/etc/loki/loki.yml"]
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./infra/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    networks:
      - coin

  promtail:
    image: grafana/promtail:3.4.2
    command: ["-config.file=/etc/promtail/promtail.yml"]
    depends_on:
      - loki
    volumes:
      - ./infra/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - coin

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.4.2
    command:
      - --nginx.scrape-uri=http://nginx/nginx_status
    depends_on:
      - nginx
    expose:
      - "9113"
    networks:
      - coin

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "9121"
    networks:
      - coin

  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.11.1
    pid: host
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($$|/)
    expose:
      - "9100"
    volumes:
      - /:/host:ro
    networks:
      - coin

networks:
  coin:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  prometheus-data:
  grafana-data:
  loki-data:
