name: coin-zzickmock-infra

services:
  redis:
    image: redis:7.4-alpine
    command:
      - sh
      - -c
      - |
        if [ -n "$${REDIS_PASSWORD:-}" ]; then
          exec redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
        fi
        exec redis-server --appendonly yes
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD to the Redis password/ACL secret}
    ports:
      - "${INFRA_BIND_ADDRESS:?Set INFRA_BIND_ADDRESS to the infra private interface}:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - infra

  prometheus:
    image: prom/prometheus:v3.0.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    depends_on:
      - redis-exporter
      - node-exporter
      - loki
    ports:
      - "${INFRA_BIND_ADDRESS:?Set INFRA_BIND_ADDRESS to the infra private interface}:${PROMETHEUS_PORT:-9090}:9090"
    extra_hosts:
      - "backend-private:${BACKEND_PRIVATE_HOST:?Set BACKEND_PRIVATE_HOST to the backend host private DNS/IP}"
    volumes:
      - ./infra/prometheus/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    networks:
      - infra

  grafana:
    image: grafana/grafana:11.5.2
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    ports:
      - "${INFRA_BIND_ADDRESS:?Set INFRA_BIND_ADDRESS to the infra private interface}:${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_METRICS_ENABLED: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - infra

  loki:
    image: grafana/loki:3.4.2
    restart: unless-stopped
    command: [ "-config.file=/etc/loki/loki.yml" ]
    ports:
      - "${INFRA_BIND_ADDRESS:?Set INFRA_BIND_ADDRESS to the infra private interface}:${LOKI_PORT:-3100}:3100"
    volumes:
      - ./infra/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    networks:
      - infra

  promtail:
    image: grafana/promtail:3.4.2
    restart: unless-stopped
    command: [ "-config.file=/etc/promtail/promtail.yml", "-config.expand-env=true" ]
    depends_on:
      - loki
    environment:
      LOKI_PUSH_URL: ${LOKI_PUSH_URL:-http://loki:3100/loki/api/v1/push}
    volumes:
      - ./infra/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - infra

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD to the Redis password/ACL secret}
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "9121"
    networks:
      - infra

  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.11.1
    restart: unless-stopped
    pid: host
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($$|/)
    expose:
      - "9100"
    volumes:
      - /:/host:ro
    networks:
      - infra

networks:
  infra:
    driver: bridge

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
  loki-data:
