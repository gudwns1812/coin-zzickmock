name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  branch-name:
    name: Branch Name Policy
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate branch name
        run: node .github/branch-policy/validate-branch-name.cjs "$BRANCH_NAME"

  frontend:
    name: Frontend Typecheck And Build
    runs-on: ubuntu-latest
    needs: branch-name
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      SENTRY_SUPPRESS_GLOBAL_ERROR_HANDLER_FILE_WARNING: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend Architecture Lint And Test
    runs-on: ubuntu-latest
    needs: branch-name
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Ensure Gradle wrapper is executable
        run: chmod +x gradlew

      - name: Run backend check
        run: ./gradlew check --console=plain

      - name: Upload backend architecture lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-architecture-lint-report
          path: backend/build/reports/architecture-lint/violations.jsonl
          if-no-files-found: ignore
