server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yml

limits_config:
  max_line_size: 1MB
  max_line_size_truncate: false

clients:
  - url: ${LOKI_PUSH_URL}

scrape_configs:
  - job_name: docker
    pipeline_stages:
      - drop:
          older_than: 1h
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: status
            values: ["running"]
    relabel_configs:
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        regex: "coin-zzickmock(-backend|-infra)?"
        action: keep
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: compose_project
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_label_coin_zzickmock_application"]
        regex: "(.+)"
        target_label: application
      - source_labels: ["__meta_docker_container_label_coin_zzickmock_environment"]
        regex: "(.+)"
        target_label: environment
