worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main 'event=nginx.request.completed service=nginx '
                    'remote_addr=$remote_addr method=$request_method '
                    'uri="$uri" status=$status durationMs=$request_time '
                    'upstream="$upstream_addr" upstreamStatus="$upstream_status" '
                    'upstreamDurationMs="$upstream_response_time"';

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;
    resolver 127.0.0.11 valid=30s ipv6=off;

    #
    # HTTP -> HTTPS redirect
    #
    server {
        listen 80;
        server_name coin-zzickmock.duckdns.org;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location = /nginx_status {
            stub_status;
            access_log off;

            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;

            deny all;
        }

        location = /internal/metrics/node {
            set $node_exporter_upstream http://node-exporter:9100/metrics;

            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass $node_exporter_upstream;
        }

        location = /internal/metrics/nginx {
            set $nginx_exporter_upstream http://nginx-exporter:9113/metrics;

            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass $nginx_exporter_upstream;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    #
    # HTTPS
    #
    server {
        listen 443 ssl http2;
        server_name coin-zzickmock.duckdns.org;

        ssl_certificate /etc/letsencrypt/live/coin-zzickmock.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/coin-zzickmock.duckdns.org/privkey.pem;

        location = /nginx_status {
            stub_status;
            access_log off;

            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;

            deny all;
        }

        location = /actuator/health {
            set $backend_upstream http://backend:8080;

            proxy_pass $backend_upstream;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /actuator/ {
            return 404;
        }

        location /api/futures/ {
            set $backend_upstream http://backend:8080;

            proxy_pass $backend_upstream;

            proxy_http_version 1.1;

            proxy_buffering off;
            proxy_cache off;

            proxy_read_timeout 1h;
            proxy_send_timeout 1h;

            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location = /grafana {
            return 301 /grafana/;
        }

        location /grafana/api/live/ {
            set $grafana_upstream http://grafana:3000;

            proxy_pass $grafana_upstream;

            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Prefix /grafana;
        }

        location /grafana/ {
            set $grafana_upstream http://grafana:3000;

            proxy_pass $grafana_upstream;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Prefix /grafana;
        }

        location / {
            return 404;
        }
    }
}
