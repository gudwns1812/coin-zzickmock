spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:coin_zzickmock}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true&characterEncoding=UTF-8
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:test1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  sql:
    init:
      mode: never
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}

logging:
  level:
    org.hibernate.SQL: info

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: coin-zzickmock
      service: backend
      environment: ${APP_ENV:local}

app:
  auth:
    jwt-secret: ${JWT_SECRET:dGhlLXF1aWNrLWJyb3duLWZveC1qdW1wcy1vdmVyLXRoZS1sYXp5LWRvZy1hbmQtc29tZS1vdGhlci1zZWNyZXQtc3R1ZmY=}

coin:
  bitget:
    websocket:
      enabled: ${BITGET_WEBSOCKET_ENABLED:true}
      uri: ${BITGET_WEBSOCKET_URI:wss://ws.bitget.com/v2/ws/public}
      symbols:
        - BTCUSDT
        - ETHUSDT
      reconnect-delay: ${BITGET_WEBSOCKET_RECONNECT_DELAY:PT5S}
      heartbeat-delay: ${BITGET_WEBSOCKET_HEARTBEAT_DELAY:PT25S}
  cache:
    redis:
      enabled: true
  leaderboard:
    redis:
      enabled: ${LEADERBOARD_REDIS_ENABLED:true}
      key-prefix: ${LEADERBOARD_REDIS_KEY_PREFIX:coin:leaderboard:}
    refresh:
      enabled: ${LEADERBOARD_REFRESH_ENABLED:false}
      delay-ms: ${LEADERBOARD_REFRESH_DELAY_MS:3600000}
      initial-delay-ms: ${LEADERBOARD_REFRESH_INITIAL_DELAY_MS:0}
    warmup:
      enabled: ${LEADERBOARD_WARMUP_ENABLED:true}
